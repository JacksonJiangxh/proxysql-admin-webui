version: '3.8'

# ProxySQL Admin WebUI — 单容器部署
#
# 所有配置通过项目根目录的 .env 文件统一管理。
# 首次部署请复制 .env.example → .env 并修改其中的密钥：
#   cp .env.example .env
#   vim .env    # 修改 SECRET_KEY 和 FERNET_KEY
#
# 镜像标签说明：
#   latest      最新稳定版（推荐）
#   <version>   指定版本（如 v1.0.0）
#
# 镜像仓库（二选一）：
#   CNB:  docker.cnb.cool/xzydm/proxysql-admin-webui   ← 默认（主仓库）
#   GitHub: ghcr.io/jacksonjiangxh/proxysql-admin-webui  ← GitHub 镜像

services:
  proxysql-admin-webui:
    image: docker.cnb.cool/xzydm/proxysql-admin-webui:latest
    # 如需从源码构建，替换为以下内容：
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    restart: unless-stopped
    # ── Health check ─────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # ── Resource limits ──────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # ── Security hardening ───────────────────────────────────
    # read_only: true would break /app/data volume writes; use
    # tmpfs for /tmp instead to limit writable paths.
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    security_opt:
      - no-new-privileges:true

volumes:
  app_data:

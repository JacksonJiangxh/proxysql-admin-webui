name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  UPSTREAM_URL: https://cnb.cool/xzydm/proxysql-admin-webui.git

jobs:
  sync:
    name: Sync from Upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream (code + tags)
        run: |
          git remote add upstream ${{ env.UPSTREAM_URL }} || \
            git remote set-url upstream ${{ env.UPSTREAM_URL }}
          # 拉取 main 分支代码（不含 tag 是因为后面 --tags 更完整）
          git fetch upstream main
          # 拉取全部 tag，--force 确保覆盖本地已有轻量 tag 为带注释 tag
          git fetch upstream --tags --force

      - name: Sync tags from upstream → origin
        id: tags
        run: |
          echo "🔍 Scanning for new tags from upstream..."
          NEW_COUNT=0
          NEW_TAGS=""

          # 获取 upstream 所有 tag（过滤 dereference 后缀 ^{}）
          UPSTREAM_TAGS=$(git ls-remote --tags upstream \
            | grep -v '\^{}' \
            | awk '{print $2}' \
            | sed 's|refs/tags/||')

          for tag in $UPSTREAM_TAGS; do
            if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "  ⏭️  Already exists: ${tag}"
            else
              # 获取 tag 对应的 commit，确保该 commit 已在本地
              TAG_SHA=$(git ls-remote --tags upstream "refs/tags/${tag}" \
                | grep -v '\^{}' \
                | awk '{print $1}')
              if [ -z "$TAG_SHA" ]; then
                echo "  ⚠️  Skipping ${tag}: could not resolve commit"
                continue
              fi
              # 如果 commit 不在本地，fetch 它
              if ! git cat-file -e "${TAG_SHA}" 2>/dev/null; then
                git fetch upstream "${TAG_SHA}"
              fi
              echo "  🏷️  Pushing new tag: ${tag}"
              git push origin "refs/tags/${tag}"
              NEW_TAGS="${NEW_TAGS} ${tag}"
              NEW_COUNT=$((NEW_COUNT + 1))
            fi
          done

          echo "count=${NEW_COUNT}" >> $GITHUB_OUTPUT
          echo "list=${NEW_TAGS}" >> $GITHUB_OUTPUT

          if [ "${NEW_COUNT}" -gt 0 ]; then
            echo "✅ Pushed ${NEW_COUNT} new tag(s) → Release workflows triggered"
          else
            echo "ℹ️  No new tags to sync"
          fi

      - name: Check for source changes
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          ORIGIN_SHA=$(git rev-parse origin/main)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "origin_sha=$ORIGIN_SHA" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_SHA" != "$ORIGIN_SHA" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Upstream has new changes"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new source changes"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/upstream
          delete-branch: true
          title: 'chore: sync from upstream'
          body: |
            Automated sync from upstream.

            - **Upstream**: ${{ env.UPSTREAM_URL }}
            - **Upstream SHA**: ${{ steps.check.outputs.upstream_sha }}
            - **Current SHA**: ${{ steps.check.outputs.origin_sha }}
          labels: sync, automated
          commit-message: 'chore: sync from upstream'
          committer: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          base: main

      - name: Summary
        run: |
          echo "## 🔄 Sync Upstream Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream | \`xzydm/proxysql-admin-webui\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream SHA | \`${{ steps.check.outputs.upstream_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Current SHA | \`${{ steps.check.outputs.origin_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Source changed | ${{ steps.check.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags synced | ${{ steps.tags.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tags.outputs.count }}" -gt 0 ]; then
            echo "| New tags | ${{ steps.tags.outputs.list }} |" >> $GITHUB_STEP_SUMMARY
          fi

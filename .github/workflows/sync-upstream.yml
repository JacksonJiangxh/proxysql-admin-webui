name: Sync Upstream (Mirror)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  UPSTREAM_URL: https://cnb.cool/xzydm/proxysql-admin-webui.git

jobs:
  sync:
    name: Mirror from Upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream (code + tags)
        run: |
          git remote add upstream ${{ env.UPSTREAM_URL }} || \
            git remote set-url upstream ${{ env.UPSTREAM_URL }}
          git fetch upstream main
          git fetch upstream --tags --force

      - name: Sync tags from upstream → origin
        id: tags
        run: |
          echo "🔍 Scanning for new tags from upstream..."
          NEW_COUNT=0
          NEW_TAGS=""

          ORIGIN_TAGS=$(git ls-remote --tags origin \
            | grep -v '\^{}' \
            | awk '{print $2}' \
            | sed 's|refs/tags/||')

          UPSTREAM_TAGS=$(git ls-remote --tags upstream \
            | grep -v '\^{}' \
            | awk '{print $2}' \
            | sed 's|refs/tags/||')

          for tag in $UPSTREAM_TAGS; do
            if echo "$ORIGIN_TAGS" | grep -qxF "${tag}"; then
              echo "  ⏭️  Already on origin: ${tag}"
            else
              TAG_SHA=$(git ls-remote --tags upstream "refs/tags/${tag}" \
                | grep -v '\^{}' \
                | awk '{print $1}')
              if [ -z "$TAG_SHA" ]; then
                echo "  ⚠️  Skipping ${tag}: could not resolve commit"
                continue
              fi
              if ! git cat-file -e "${TAG_SHA}" 2>/dev/null; then
                git fetch upstream "${TAG_SHA}"
              fi
              echo "  🏷️  Pushing new tag to origin: ${tag}"
              git push origin "refs/tags/${tag}"
              NEW_TAGS="${NEW_TAGS} ${tag}"
              NEW_COUNT=$((NEW_COUNT + 1))
            fi
          done

          echo "count=${NEW_COUNT}" >> $GITHUB_OUTPUT
          echo "list=${NEW_TAGS}" >> $GITHUB_OUTPUT

          if [ "${NEW_COUNT}" -gt 0 ]; then
            echo "✅ Pushed ${NEW_COUNT} new tag(s) → Release workflows triggered"
          else
            echo "ℹ️  No new tags to sync"
          fi

      - name: Sync source code (mirror push)
        id: source
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          ORIGIN_SHA=$(git rev-parse origin/main)

          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "origin_sha=$ORIGIN_SHA" >> $GITHUB_OUTPUT

          if [ "$UPSTREAM_SHA" != "$ORIGIN_SHA" ]; then
            echo "📥 Source changed, mirroring..."
            echo "   Upstream: $UPSTREAM_SHA"
            echo "   Origin:   $ORIGIN_SHA"
            # 直接将 upstream/main 推送到 origin/main（镜像同步）
            # 先尝试 fast-forward push，失败则 force（纯镜像场景下可接受）
            git push origin "upstream/main:refs/heads/main" || \
              git push origin "upstream/main:refs/heads/main" --force
            echo "synced=true" >> $GITHUB_OUTPUT
            echo "✅ Source code mirrored to origin"
          else
            echo "ℹ️  Source code already in sync"
            echo "synced=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## 🔄 Sync Upstream Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream | \`xzydm/proxysql-admin-webui\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream SHA | \`${{ steps.source.outputs.upstream_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Origin SHA | \`${{ steps.source.outputs.origin_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Source synced | ${{ steps.source.outputs.synced }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags synced | ${{ steps.tags.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tags.outputs.count }}" -gt 0 ]; then
            echo "| New tags | ${{ steps.tags.outputs.list }} |" >> $GITHUB_STEP_SUMMARY
          fi

site_name: ProxySQL Admin WebUI 用户手册
site_description: ProxySQL Admin WebUI — 现代化的 ProxySQL 图形化管理界面
site_author: JacksonJiangxh

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - 首页: index.md
  - 快速入门: getting-started.md
  - 用户手册: USER_MANUAL.md
  - 配置向导参考: WIZARD_GUIDE.md
  - 安装与部署: DEPLOYMENT.md
  - 配置参考: configuration.md
  - 故障排除: troubleshooting.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: zh
      separator: '[\s\u200b\-\u3000\u3001\u3002\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]'
